name: Simple Python Run

on:
  push:
    branches: ["main"]

jobs:
  run-code:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install libraries
      run: |
        pip install numpy pandas matplotlib scikit-learn

    - name: Run script
      run: |
        python RandomForest.py
